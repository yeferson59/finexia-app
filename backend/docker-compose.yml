services:
  db:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker

  cache:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: password
      REDIS_PORT: 6379
      REDIS_DB: 0
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
