services:
  db:
    image: postgres:18-alpine
    container_name: finexia_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - finexia_net

  cache:
    image: redis:8-alpine
    container_name: finexia_cache
    command: redis-server --requirepass password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - finexia_net

networks:
  finexia_net:
    driver: bridge

volumes:
  postgres_data:
    name: finexia_postgres_data
  redis_data:
    name: finexia_redis_data
